<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claustre</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Title bar -->
    <header id="title-bar">
      <div class="title-left">
        <span class="logo">claustre</span>
        <span id="version" class="version"></span>
      </div>
      <div class="title-right">
        <div id="rate-limit" class="rate-limit"></div>
      </div>
    </header>

    <!-- Main layout -->
    <div id="main-layout">
      <!-- Sidebar: Projects -->
      <aside id="sidebar">
        <div class="sidebar-header">
          <h2>Projects</h2>
          <button id="btn-add-project" class="btn-icon" title="Add project">+</button>
        </div>
        <ul id="project-list" class="nav-list"></ul>
      </aside>

      <!-- Content: Tasks -->
      <main id="content">
        <div id="content-header">
          <h2 id="project-title">Select a project</h2>
          <div class="content-actions">
            <button id="btn-stats" class="btn-secondary" title="Stats" style="display:none">Stats</button>
            <button id="btn-new-task" class="btn-primary" title="New task" style="display:none">+ New Task</button>
          </div>
        </div>
        <div id="task-list-container">
          <div id="task-list" class="task-list"></div>
        </div>
        <div id="empty-state" class="empty-state">
          <p>No project selected. Add a project or select one from the sidebar.</p>
        </div>
      </main>

      <!-- Detail panel -->
      <aside id="detail-panel" class="detail-panel hidden">
        <div class="detail-header">
          <h3 id="detail-title"></h3>
          <button id="btn-close-detail" class="btn-icon">&times;</button>
        </div>
        <div id="detail-content"></div>
      </aside>
    </div>

    <!-- Stats overlay -->
    <div id="stats-overlay" class="overlay hidden">
      <div class="overlay-content">
        <div class="overlay-header">
          <h2>Project Stats</h2>
          <button class="btn-icon overlay-close">&times;</button>
        </div>
        <div id="stats-body" class="stats-body"></div>
      </div>
    </div>

    <!-- Task form overlay -->
    <div id="task-form-overlay" class="overlay hidden">
      <div class="overlay-content form-content">
        <div class="overlay-header">
          <h2 id="task-form-title">New Task</h2>
          <button class="btn-icon overlay-close">&times;</button>
        </div>
        <form id="task-form">
          <input type="hidden" id="task-form-id" />
          <input type="hidden" id="task-form-project-id" />

          <div class="form-group">
            <label for="task-title">Title</label>
            <input type="text" id="task-title" required placeholder="Task title" />
          </div>

          <div class="form-group">
            <label for="task-description">Description</label>
            <textarea id="task-description" rows="6" placeholder="Task description..."></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="task-mode">Mode</label>
              <select id="task-mode">
                <option value="autonomous">Autonomous</option>
                <option value="supervised" selected>Supervised</option>
                <option value="exploration">Exploration</option>
              </select>
            </div>

            <div class="form-group">
              <label for="task-push-mode">Push Mode</label>
              <select id="task-push-mode">
                <option value="pr" selected>Pull Request</option>
                <option value="push">Direct Push</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="task-branch">Branch</label>
              <input type="text" id="task-branch" placeholder="auto-generated" />
            </div>

            <div class="form-group">
              <label for="task-base">Base Branch</label>
              <input type="text" id="task-base" placeholder="default branch" />
            </div>
          </div>

          <div class="form-group checkbox-group">
            <label>
              <input type="checkbox" id="task-review-loop" />
              Enable review loop
            </label>
          </div>

          <div class="form-actions">
            <button type="button" class="btn-secondary overlay-close">Cancel</button>
            <button type="submit" class="btn-primary" id="task-form-submit">Create</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Project form overlay -->
    <div id="project-form-overlay" class="overlay hidden">
      <div class="overlay-content form-content">
        <div class="overlay-header">
          <h2>Add Project</h2>
          <button class="btn-icon overlay-close">&times;</button>
        </div>
        <form id="project-form">
          <div class="form-group">
            <label for="project-name">Name</label>
            <input type="text" id="project-name" required placeholder="Project name" />
          </div>

          <div class="form-group">
            <label for="project-path">Path</label>
            <input type="text" id="project-path" required placeholder="/path/to/repo" />
          </div>

          <div class="form-actions">
            <button type="button" class="btn-secondary overlay-close">Cancel</button>
            <button type="submit" class="btn-primary">Add Project</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Confirm delete overlay -->
    <div id="confirm-overlay" class="overlay hidden">
      <div class="overlay-content confirm-content">
        <div class="overlay-header">
          <h2>Confirm</h2>
          <button class="btn-icon overlay-close">&times;</button>
        </div>
        <p id="confirm-message"></p>
        <div class="form-actions">
          <button class="btn-secondary overlay-close">Cancel</button>
          <button id="confirm-action" class="btn-danger">Delete</button>
        </div>
      </div>
    </div>

    <!-- Subtask overlay -->
    <div id="subtask-overlay" class="overlay hidden">
      <div class="overlay-content">
        <div class="overlay-header">
          <h2 id="subtask-overlay-title">Subtasks</h2>
          <button class="btn-icon overlay-close">&times;</button>
        </div>
        <div id="subtask-list" class="subtask-list"></div>
        <form id="subtask-form" class="subtask-form">
          <input type="hidden" id="subtask-task-id" />
          <div class="form-row">
            <input type="text" id="subtask-title" placeholder="Subtask title" required />
            <button type="submit" class="btn-primary btn-sm">Add</button>
          </div>
          <textarea id="subtask-description" rows="2" placeholder="Description (optional)"></textarea>
        </form>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>
  </div>

  <script src="main.js"></script>
</body>
</html>
