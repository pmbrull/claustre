# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/
#
# Run locally:  cargo deny check
# Run in CI:    EmbarkStudios/cargo-deny-action@v2

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
]

# -------
# Advisories — block crates with known vulnerabilities
# -------
[advisories]
ignore = []

# -------
# Licenses — only allow these OSS licenses
# -------
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# -------
# Bans — prevent problematic or duplicate crates
# -------
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

# -------
# Sources — only allow crates from crates.io
# -------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
